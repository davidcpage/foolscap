# The file card type (card-types-as-data.md §7, second card). FIELDS + CODEC: title carries the
# file's path relative to its dataset root. The path → basename/dir/kind mapping — the v1 codec —
# lives in render.js as real JS, per the rule that refuses the first conditional in any declarative
# layer.
#
# GRANT:
#   • `fileContent` — the file's content as an OFF-LOG signal projected from disk (content.ts),
#     keyed by this card's path. The body reads it, not node.text, so a file card's liveness comes
#     from the watcher refreshing this signal (channel-1, derived from the one source) — never a
#     setText on the durable log. The log keeps only the card's arrangement + its path reference.
#     This is the clock rule (§9.1) applied to the file cards' own bodies.
#   • `roots` — the board's roots (canonical + git worktrees); the head reads its OWN root (card.root)
#     from here for a colour swatch matching the session-card dots + the tree (worktree-activity slice C).
#   • `gone` — true once this file is deleted on disk (or its root removed). The card shows a tombstone
#     instead of vanishing, so a pinned card is never silently dropped (worktree-activity slice D).
#   • `writeFile` — the serialize-back: a per-card action that POSTs the edited raw source to disk (POST
#     /api/file), reusing the notebook card's grant. An in-card Edit toggle flips the rendered view to a
#     raw-source <textarea>; Save writes through this (the watcher then refreshes `fileContent`, and the
#     server re-anchors doc annotations on the same write), Cancel discards. Source lives in the FILE, not
#     record.text — an edit is a file write, never a setText on the durable log.
#   • `treeState` — (ephemeral view state) whether this card is in raw-source EDIT mode. The rendered view
#     is the default; a click on Edit flips to the textarea. Per-card, off-log, gone on reload, never
#     committed — the directory card's expand-set shape, the role/notebook edit-mode idiom.
#   • `cardRef` — this card's stable copyable reference string (the host's cardReference rule), so the
#     filename TEXT itself is the click-to-copy link (the session-card pattern), not a separate ⧉ chip.
name: file
contract: 1
capabilities: [fileContent, roots, gone, writeFile, treeState, cardRef]
