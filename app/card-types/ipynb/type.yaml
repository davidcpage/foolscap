# The ipynb card type ‚Äî a READ-ONLY Jupyter notebook viewer (docs/doc-annotations.md's sibling: a file
# card specialised for `.ipynb`). Like the file card, its title carries the file's path relative to the
# dataset root, and its body is the notebook's content read OFF-LOG through the `fileContent` capability
# (content.ts) ‚Äî never node.text ‚Äî so a disk change re-renders just this body. The path ‚Üí basename/dir
# mapping is the v1 codec, real JS in render.js.
#
# GRANT:
#   ‚Ä¢ `fileContent` ‚Äî the `.ipynb` file's content as an off-log signal projected from disk, keyed by this
#     card's path. render.js JSON-parses it into cells and renders markdown / code / outputs faithfully.
#     It is byte-bounded upstream (MAX_BYTES in vite-fs-plugin.ts); a clipped notebook is invalid JSON, so
#     the template shows a truncation notice rather than adding a second cap (CLAUDE.md size-cap rule).
#   ‚Ä¢ the Jupyter kernel BROKER capabilities (Path B, docs/notebook-card.md ¬ß2) ‚Äî the card runs a REAL
#     per-repo Python kernel SERVER-side and outputs persist back into the `.ipynb`:
#       - `kernelRun`       ‚Äî run ONE cell now (by cell id / index)         ‚Üí POST /api/kernel/<node>/run
#       - `kernelRunAll`    ‚Äî run every code cell in order                  ‚Üí POST /api/kernel/<node>/run-all
#       - `kernelInterrupt` ‚Äî interrupt the running cell (KeyboardInterrupt) ‚Üí POST /api/kernel/<node>/interrupt
#       - `kernelRestart`   ‚Äî restart the kernel (fresh namespace)          ‚Üí POST /api/kernel/<node>/restart
#       - `kernelStatus`    ‚Äî the live status/streaming feed (kernel:<node>:<board>): running/idle/errored
#     Outputs are NOT written from the card: the broker merges them into the file by cell id, and the file
#     watch re-renders this card through `fileContent` ‚Äî the file is the durable, agent-legible record.
#   ‚Ä¢ the STRUCTURAL-EDIT capabilities (P2, docs/ipynb-card.md) ‚Äî edit cell SOURCE + add/delete/move cells:
#       - `notebookEdit` ‚Äî (action) apply ONE structural edit by cell id (editSource / addCell / deleteCell /
#         moveCell) ‚Üí POST /api/notebook/<node>/edit. Applied SERVER-side to the full-fidelity ON-DISK
#         notebook by cell id under CAS (server-notebook.ts), so a kernel run and a card edit never clobber;
#         the card never ships the notebook body (its `fileContent` read is the lossy RENDER projection). The
#         durable result arrives via `fileContent` (the file watch re-renders), like the kernel output merge.
#       - `treeState` ‚Äî (ephemeral view state) which cells are in RAW-EDIT mode. Off-log, gone on reload,
#         never committed ‚Äî the directory card's expand-set shape. The in-progress edit DRAFT text lives in a
#         module-level map in render.js (not here), so it survives a watch re-render (kernel write-back).
#   ‚Ä¢ `cardRef` ‚Äî this card's stable copyable reference string (the host's cardReference rule), so the
#     filename TEXT in the head is the click-to-copy link (the session-card pattern), not a separate ‚ßâ chip.
#
# html outputs are rendered RAW (trusted-notebook assumption, unsanitised) ‚Äî see render.js.
name: ipynb
contract: 1
capabilities: [fileContent, kernelRun, kernelRunAll, kernelInterrupt, kernelRestart, kernelStatus, notebookEdit, treeState, cardRef]
