# The usage card type — provider-explicit plan/account state for Claude and Codex. It holds
# TWO off-log reads, both channel-1 (never the canvas log):
#   • `usage` — a provider map. Claude comes from Anthropic's OAuth usage endpoint; Codex account,
#     ChatGPT/workspace billing, rolling windows, and credits come from app-server account methods.
#   • `session` — the per-card live transcript tail (keyed by this card's title = a session id), from
#     which it derives a SECONDARY per-session token/context gauge off each assistant `message.usage`.
#     Optional: present only when the card is titled with a session that also has a session card live.
#
# So an untitled usage card shows the plan bars alone; title it with a live session id to also get that
# session's token gauge. See render.js for the two codecs and the not-authed / rate-limited states.
name: usage
contract: 1
capabilities: [usage, session, usageRefresh]
