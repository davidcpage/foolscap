# The sessions browser card type (Phase C) — a persistent on-canvas list of historical agent sessions,
# the same move the directory card made for files: stop putting the chooser in a menu, put a browser on
# the board and DRAG a row out to open it. FIELDS: title/text/color are unused chrome (the body is the
# list); a single board-global card (one node:sessions), so it carries no per-card key.
#
# GRANT:
#   • `sessionList` — the OFF-LOG list of historical transcripts (content.ts, GET /api/sessions): id +
#     ai-title + turns + mtime + bytes, newest-first. Channel-1 / derived — listing the disk touches no
#     diff, no intent event, no persistence. The log keeps only the card's arrangement. DRAG any row onto
#     the canvas to OPEN that session as its own card (loader.openSession) — that promotion is the one act.
#   • `sessionRefresh` — a per-card ACTION (a bound fn, not a signal) that re-pulls the list. There's no
#     disk-watch push for the sessions dir, so the refresh button is how a long-open card picks up newly-
#     written transcripts. Session-list-internal, never the canvas log.
#
# No `chrome` flag: a browser is a container and wants its frame (like the directory card, unlike the clock).
name: sessions
contract: 1
capabilities: [sessionList, sessionRefresh]
